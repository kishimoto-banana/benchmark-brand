<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>商品マッピング（類似度 × 人気度）</title>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Yu Gothic", sans-serif;
  background: #fafafa;
  color: #222;
}
.wrap {
  display: grid;
  grid-template-columns: 1.5fr 0.95fr;
  gap: 16px;
  padding: 16px;
  height: 100vh;
  box-sizing: border-box;
}
.card {
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  overflow: hidden;
}
#plot {
  width: 100%;
  height: calc(100vh - 32px);
}
.side {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  height: calc(100vh - 32px);
  box-sizing: border-box;
}
.title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
}
.hint {
  color: #666;
  font-size: 13px;
  line-height: 1.5;
}
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  margin-bottom: 4px;
}
.toolbar label {
  color: #666;
  font-size: 13px;
}
.toolbar select {
  border: 1px solid #ddd;
  background: #fff;
  border-radius: 10px;
  padding: 8px 10px;
  font-size: 14px;
}
.toolbar button {
  border: 1px solid #222;
  background: #222;
  color: #fff;
  border-radius: 10px;
  padding: 8px 12px;
  font-size: 14px;
  cursor: pointer;
}
.toolbar button:hover { opacity: 0.86; }
.meta {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 8px 12px;
  font-size: 14px;
  line-height: 1.5;
}
.label { color: #666; }
.badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 999px;
  background: #f0f0f0;
  font-size: 12px;
}
.image-box {
  flex: 1;
  min-height: 320px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f6f6f6;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #eee;
}
.image-box img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: block;
}
</style>

</head>
<body>
<div class="wrap">
  <div class="card"><div id="plot"></div></div>
  <div class="card side">
    <div>
      <div class="title">商品マッピング（類似度 × 人気度）</div>
      <div class="hint">横軸は類似度、縦軸は人気度です。</div>
    </div>
    <div class="toolbar">
      <label for="seasonFilter">シーズン</label><select id="seasonFilter"></select>
      <label for="categoryFilter">カテゴリ</label><select id="categoryFilter"><option value="__ALL__">すべて</option></select>
      <label for="periodFilter">ランキング期間</label>
      <select id="periodFilter">
        <option value="7">直近7日</option>
        <option value="14">直近14日</option>
        <option value="30">直近30日</option>
        <option value="all">全期間</option>
      </select>
      <button id="exportCsvButton" type="button">表示データCSV出力</button>
    </div>
    <div class="meta">
      <div class="label">シーズン</div><div id="meta-season">-</div>
      <div class="label">ブランド</div><div id="meta-brand">-</div>
      <div class="label">商品名</div><div id="meta-name">-</div>
      <div class="label">商品ID</div><div id="meta-id">-</div>
      <div class="label">カテゴリ</div><div id="meta-category">-</div>
      <div class="label">類似度</div><div id="meta-sim">-</div>
      <div class="label">人気度</div><div id="meta-pop">-</div>
      <div class="label">人気度 raw</div><div id="meta-pop-raw">-</div>
      <div class="label">出現回数</div><div id="meta-appear">-</div>
      <div class="label">最高順位</div><div id="meta-best-rank">-</div>
      <div class="label">対象PF</div><div id="meta-platforms">-</div>
    </div>
    <div class="image-box"><img id="preview" alt="商品画像" /></div>
  </div>
</div>

const seasons = ["26SS", "25SS", "25FW"];

const seasonFilter = document.getElementById("seasonFilter");
const categoryFilter = document.getElementById("categoryFilter");
const periodFilter = document.getElementById("periodFilter");
const exportCsvButton = document.getElementById("exportCsvButton");

for (const s of seasons) {
  const opt = document.createElement("option");
  opt.value = s;
  opt.textContent = s;
  seasonFilter.appendChild(opt);
}
periodFilter.value = "7";

function updateCategoryOptions() {
  const selectedSeason = seasonFilter.value;
  const seasonData = products.filter(d => d["シーズン"] === selectedSeason);
  const categories = [...new Set(seasonData.map(d => d["カテゴリ"]).filter(Boolean))].sort();
  categoryFilter.innerHTML = "";
  const allOpt = document.createElement("option");
  allOpt.value = "__ALL__";
  allOpt.textContent = "すべて";
  categoryFilter.appendChild(allOpt);
  for (const cat of categories) {
    const opt = document.createElement("option");
    opt.value = cat;
    opt.textContent = cat;
    categoryFilter.appendChild(opt);
  }
}

function getFilteredProducts() {
  const selectedSeason = seasonFilter.value;
  const selectedCategory = categoryFilter.value;
  let data = products.filter(d => d["シーズン"] === selectedSeason);
  if (selectedCategory !== "__ALL__") {
    data = data.filter(d => d["カテゴリ"] === selectedCategory);
  }
  return data;
}

function uniqueBrands(data) {
  return [...new Set(data.map(d => d["ブランド"]).filter(b => b && b.trim() !== ""))].sort();
}

function buildBrandLevelMap(data) {
  const brands = uniqueBrands(data);
  const levelMap = {};
  brands.forEach((b, i) => levelMap[b] = brands.length - 1 - i);
  if (brands.length === 0) levelMap["商品"] = 0;
  return levelMap;
}

function getSelectedDateRange() {
  const period = periodFilter.value;
  const allDates = rankings.map(r => r["日付"]).sort();
  const maxDate = allDates[allDates.length - 1];
  if (!maxDate) return null;
  const end = new Date(maxDate + "T00:00:00");
  let start = null;
  if (period === "all") return { start: null, end };
  const days = parseInt(period, 10);
  start = new Date(end);
  start.setDate(end.getDate() - (days - 1));
  return { start, end };
}

function computePopularityMap(productIds) {
  const idSet = new Set(productIds);
  const range = getSelectedDateRange();

  const stats = {};
  for (const id of productIds) {
    stats[id] = {
      popularity_raw: 0,
      appearances: 0,
      best_rank: null,
      platform_set: new Set()
    };
  }

  for (const r of rankings) {
    const id = String(r["商品ID"]);
    if (!idSet.has(id)) continue;

    const d = new Date(r["日付"] + "T00:00:00");
    if (range && range.start && (d < range.start || d > range.end)) continue;

    stats[id].popularity_raw += Number(r["rank_score"]) || 0;
    stats[id].appearances += 1;
    const rank = Number(r["順位"]);
    if (stats[id].best_rank === null || rank < stats[id].best_rank) {
      stats[id].best_rank = rank;
    }
    if (r["プラットフォーム"]) stats[id].platform_set.add(r["プラットフォーム"]);
  }

  const vals = Object.values(stats).map(v => v.popularity_raw);
  const minVal = Math.min(...vals);
  const maxVal = Math.max(...vals);

  for (const id of productIds) {
    const raw = stats[id].popularity_raw;
    let norm = 0;
    if (maxVal > minVal) {
      norm = (raw - minVal) / (maxVal - minVal);
    } else if (maxVal > 0) {
      norm = 1;
    }
    stats[id].popularity = norm;
    stats[id].platforms = Array.from(stats[id].platform_set).sort().join(", ");
    delete stats[id].platform_set;
  }
  return stats;
}


function csvEscape(value) {
  if (value === null || value === undefined) return "";
  const str = String(value);
  if (/[",\n\r]/.test(str)) return '"' + str.replace(/"/g, '""') + '"';
  return str;
}

function getPeriodLabel() {
  const opt = periodFilter.options[periodFilter.selectedIndex];
  return opt ? opt.textContent : periodFilter.value;
}

function exportVisibleCsv() {
  const filtered = getFilteredProducts();
  const ids = filtered.map(d => d["商品ID"]);
  const popStats = computePopularityMap(ids);
  const period = periodFilter.value;
  const periodLabel = getPeriodLabel();
  const columns = ["シーズン", "カテゴリ", "ブランド", "商品ID", "商品名", "類似度", "類似度_raw", "ランキング期間", "人気度", "人気度raw", "出現回数", "最高順位", "対象PF", "画像URL"];
  const rows = filtered.map(d => {
    const st = popStats[d["商品ID"]] || {};
    return {
      "シーズン": d["シーズン"] ?? "",
      "カテゴリ": d["カテゴリ"] ?? "",
      "ブランド": d["ブランド"] ?? "",
      "商品ID": d["商品ID"] ?? "",
      "商品名": d["商品名"] ?? "",
      "類似度": d["類似度"] ?? "",
      "類似度_raw": d["類似度_raw"] ?? "",
      "ランキング期間": periodLabel,
      "人気度": st.popularity ?? 0,
      "人気度raw": st.popularity_raw ?? 0,
      "出現回数": st.appearances ?? 0,
      "最高順位": st.best_rank ?? "",
      "対象PF": st.platforms ?? "",
      "画像URL": d["画像URL"] ?? ""
    };
  });
  const csv = [columns.map(csvEscape).join(","), ...rows.map(row => columns.map(col => csvEscape(row[col])).join(","))].join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const season = seasonFilter.value || "all";
  const category = categoryFilter.value === "__ALL__" ? "all" : categoryFilter.value;
  const safeCategory = String(category).replace(/[\\/:*?"<>|\s]+/g, "_");
  a.href = url;
  a.download = `表示データ_${season}_${safeCategory}_${period}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function updateSidePanel(d, popStats) {
  const s = popStats[d["商品ID"]] || { popularity: 0, popularity_raw: 0, appearances: 0, best_rank: null, platforms: "" };
  document.getElementById("meta-season").textContent = d["シーズン"] ?? "-";
  document.getElementById("meta-brand").textContent = d["ブランド"] ?? "-";

  document.getElementById("meta-id").textContent = d["商品ID"] ?? "-";
  document.getElementById("meta-category").textContent = d["カテゴリ"] ?? "-";
  document.getElementById("meta-sim").innerHTML = `${Number(d["類似度"]).toFixed(3)} <span class="badge">raw: ${Number(d["類似度_raw"]).toFixed(3)}</span>`;
  document.getElementById("meta-pop").textContent = Number(s.popularity).toFixed(3);
  document.getElementById("meta-pop-raw").textContent = Number(s.popularity_raw).toFixed(1);
  document.getElementById("meta-appear").textContent = s.appearances ?? 0;
  document.getElementById("meta-best-rank").textContent = s.best_rank ?? "-";
  document.getElementById("meta-platforms").textContent = s.platforms || "-";
  document.getElementById("preview").src = d["画像URL"] || "";
}

<script>
function renderPlot() {
  const filtered = getFilteredProducts();
  const ids = filtered.map(d => d["商品ID"]);
  const popStats = computePopularityMap(ids);
  const threshold = filtered.length ? filtered.map(d => d["類似度"]).sort((a,b)=>a-b)[Math.floor(filtered.length/2)] : 0.5;

  const brands = uniqueBrands(filtered);
  const traces = [];

  if (brands.length === 0) {
    traces.push({
      x: filtered.map(d => d["類似度"]),
      y: filtered.map(d => (popStats[d["商品ID"]] || {popularity:0}).popularity || 0),
      mode: "markers",
      type: "scatter",
      name: "商品",
      text: filtered.map(d => {
        const s = popStats[d["商品ID"]] || {};
        return `ブランド: ${d["ブランド"] || "-"}<br>商品名: ${d["商品名"] || "-"}<br>類似度: ${Number(d["類似度"]).toFixed(3)}<br>人気度: ${Number(s.popularity || 0).toFixed(3)}<br>出現回数: ${s.appearances || 0}<br>最高順位: ${s.best_rank ?? "-"}`;
      }),
      customdata: filtered,
      hovertemplate: "%{text}<extra></extra>",
      marker: {
        size: 13,
        opacity: 0.86,
        line: {width: 0.5, color: "#ffffff"}
      }
    });
  } else {
    for (const brand of brands) {
      const sub = filtered.filter(d => d["ブランド"] === brand);
      traces.push({
        x: sub.map(d => d["類似度"]),
        y: sub.map(d => (popStats[d["商品ID"]] || {popularity:0}).popularity || 0),
        mode: "markers",
        type: "scatter",
        name: brand,
        text: sub.map(d => {
          const s = popStats[d["商品ID"]] || {};
          return `ブランド: ${d["ブランド"] || "-"}<br>商品名: ${d["商品名"] || "-"}<br>類似度: ${Number(d["類似度"]).toFixed(3)}<br>人気度: ${Number(s.popularity || 0).toFixed(3)}<br>出現回数: ${s.appearances || 0}<br>最高順位: ${s.best_rank ?? "-"}`;
        }),
        customdata: sub,
        hovertemplate: "%{text}<extra></extra>",
        marker: {
          size: 13,
          opacity: 0.86,
          line: {width: 0.5, color: "#ffffff"}
        }
      });
    }
  }

  const layout = {
    margin: {l: 70, r: 20, t: 30, b: 65},
    xaxis: { title: {text: "類似度", font: {size: 18}}, range: [0,1], tickfont: {size: 13}, zeroline: false },
    yaxis: {
      title: {text: "人気度", font: {size: 18}},
      range: [-0.03, 1.05],
      tickfont: {size: 13},
      zeroline: false
    },
    legend: {
      title: {text: "ブランド"},
      orientation: "h",
      yanchor: "bottom", y: 1.02, xanchor: "left", x: 0,
      font: {size: 12}
    },
    shapes: [{
      type: "line", x0: threshold, x1: threshold, y0: 0, y1: 1,
      line: {dash: "dash", width: 1}
    }],
    annotations: [
      {x: 0.98, y: 0.95, xref: "paper", yref: "paper", text: "<b>高類似</b>", showarrow: false, xanchor: "right", yanchor: "top", font: {size: 20}},
      {x: 0.02, y: 0.95, xref: "paper", yref: "paper", text: "<b>低類似</b>", showarrow: false, xanchor: "left", yanchor: "top", font: {size: 20}}
    ]
  };

  Plotly.newPlot("plot", traces, layout, {responsive: true, displaylogo: false});
  const plot = document.getElementById("plot");
  plot.on("plotly_hover", (ev) => updateSidePanel(ev.points[0].customdata, popStats));
  plot.on("plotly_click", (ev) => updateSidePanel(ev.points[0].customdata, popStats));
  if (filtered.length > 0) updateSidePanel(filtered[0], popStats);
}
