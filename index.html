const brandPalette=['#4E79A7','#F28E2B','#E15759','#76B7B2','#59A14F','#EDC948','#B07AA1','#FF9DA7','#9C755F','#BAB0AC','#8CD17D','#B6992D'];
const brandColorMap={};
[...new Set(products.map(d=>d['ブランド']).filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b),'ja')).forEach((b,i)=>brandColorMap[b]=brandPalette[i%brandPalette.length]);
function esc(s){return String(s ?? '').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
function seasonKey(s){const m=String(s||'').match(/(\d{2})(SS|FW)/i); if(!m)return [-999,9]; return [-parseInt(m[1],10), m[2].toUpperCase()==='SS'?0:1];}
function uniqueSorted(arr, season=false){let vals=[...new Set(arr.filter(v=>v!==undefined&&v!==null&&String(v).trim()!==''))]; if(season) vals.sort((a,b)=>{const ka=seasonKey(a),kb=seasonKey(b); return ka[0]-kb[0]||ka[1]-kb[1]||String(a).localeCompare(String(b),'ja');}); else vals.sort((a,b)=>String(a).localeCompare(String(b),'ja')); return vals;}
function setSelect(sel, vals, includeAll=true){sel.innerHTML=(includeAll?'<option value="__ALL__">すべて</option>':'')+vals.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');}
function initFilters(seasonNoAll=true){
  const seasons=uniqueSorted(products.map(d=>d['シーズン']), true);
  setSelect(document.getElementById('seasonFilter'), seasons, !seasonNoAll);
  setSelect(document.getElementById('categoryFilter'), uniqueSorted(products.map(d=>d['カテゴリ'])), true);
  const params=new URLSearchParams(location.search);
  const sf=document.getElementById('seasonFilter');
  const cf=document.getElementById('categoryFilter');
  const pf=document.getElementById('periodFilter');
  if(params.get('season') && [...sf.options].some(o=>o.value===params.get('season'))) sf.value=params.get('season');
  else if(seasonNoAll && seasons.length) sf.value=seasons[0];
  if(params.get('category') && [...cf.options].some(o=>o.value===params.get('category'))) cf.value=params.get('category');
  if(params.get('period') && [...pf.options].some(o=>o.value===params.get('period'))) pf.value=params.get('period');
}
function getFilteredProducts(){const s=document.getElementById('seasonFilter').value; const c=document.getElementById('categoryFilter').value; return products.filter(d=>(s==='__ALL__'||d['シーズン']===s)&&(c==='__ALL__'||d['カテゴリ']===c));}
function getPeriodRankings(period){ if(period==='all') return rankings; const ds=rankings.map(r=>new Date(r['日付'])).filter(d=>!isNaN(d)); if(!ds.length)return rankings; const maxDate=new Date(Math.max(...ds)); const minDate=new Date(maxDate); minDate.setDate(minDate.getDate()-(Number(period)-1)); return rankings.filter(r=>{const d=new Date(r['日付']); return !isNaN(d)&&d>=minDate&&d<=maxDate;});}
function buildPopularity(filtered, period){
  const ids=new Set(filtered.map(d=>d['商品ID'])); const stats={};
  filtered.forEach(d=>stats[d['商品ID']]={popularity_raw:0,count:0,best_rank:null,platforms:new Set(),urls:{}});
  getPeriodRankings(period).forEach(r=>{if(!ids.has(r['商品ID']))return; const st=stats[r['商品ID']]; st.popularity_raw+=Number(r.rank_score)||0; st.count+=1; if(r['順位']) st.best_rank=st.best_rank===null?Number(r['順位']):Math.min(st.best_rank,Number(r['順位'])); if(r['プラットフォーム']) st.platforms.add(r['プラットフォーム']); if(r['商品URL']) st.urls[r['プラットフォーム']||'商品URL']=r['商品URL'];});
  const vals=Object.values(stats).map(s=>s.popularity_raw); const min=vals.length?Math.min(...vals):0; const max=vals.length?Math.max(...vals):0;
  Object.values(stats).forEach(st=>{st.popularity=max===min?(st.popularity_raw>0?1:0):(st.popularity_raw-min)/(max-min); st.platformsText=[...st.platforms].join(' / ');});
  return stats;
}
function urlEntries(st){return Object.entries((st&&st.urls)||{}).filter(([k,v])=>v);}
function urlLinks(st){const ent=urlEntries(st); if(!ent.length)return '-'; return ent.map(([pf,url])=>`<a href="${esc(url)}" target="_blank" rel="noopener">${esc(String(pf).toUpperCase())}</a>`).join(' / ');}
function primaryUrl(st){const ent=urlEntries(st); if(!ent.length)return ''; const zozo=ent.find(([pf])=>String(pf).toLowerCase().includes('zozo')); if(zozo)return zozo[1]; const rak=ent.find(([pf])=>String(pf).toLowerCase().includes('rak')); if(rak)return rak[1]; const usa=ent.find(([pf])=>String(pf).toLowerCase().includes('usagi')); if(usa)return usa[1]; return ent[0][1];}
function urlText(st){return urlEntries(st).map(([pf,url])=>`${pf}: ${url}`).join(' | ');}
function csvEsc(v){const s=String(v??''); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}

let currentFiltered=[], currentStats={}, selectedId=new URLSearchParams(location.search).get('product_id');
function updateDetail(d){ if(!d)d=currentFiltered[0]; if(!d)return; selectedId=d['商品ID']; const st=currentStats[d['商品ID']]||{popularity:0,platformsText:'',urls:{}}; document.getElementById('meta-season').textContent=d['シーズン']||'-'; document.getElementById('meta-brand').textContent=d['ブランド']||'-'; document.getElementById('meta-name').textContent=d['商品名']||'-'; document.getElementById('meta-id').textContent=d['商品ID']||'-'; document.getElementById('meta-category').textContent=d['カテゴリ']||'-'; document.getElementById('meta-sim').textContent=Number(d['類似度']||0).toFixed(3); document.getElementById('meta-pop').textContent=Number(st.popularity||0).toFixed(3); document.getElementById('meta-platforms').textContent=st.platformsText||'-'; document.getElementById('meta-url').innerHTML=urlLinks(st); document.getElementById('preview').src=d['画像URL']||''; }
function render(){ currentFiltered=getFilteredProducts(); const period=document.getElementById('periodFilter').value; currentStats=buildPopularity(currentFiltered,period); const brands=uniqueSorted(currentFiltered.map(d=>d['ブランド'])); const traces=brands.map(b=>{const arr=currentFiltered.filter(d=>d['ブランド']===b); return {type:'scatter',mode:'markers',name:b,x:arr.map(d=>d['類似度']),y:arr.map(d=>(currentStats[d['商品ID']]||{}).popularity||0),text:arr.map(d=>d['商品名']),customdata:arr.map(d=>d['商品ID']),marker:{size:13,color:brandColorMap[b],opacity:.78,line:{width:1,color:'#fff'}},hovertemplate:'ブランド: %{fullData.name}<br>商品名: %{text}<br>類似度: %{x:.3f}<br>人気度: %{y:.3f}<extra></extra>'};}); const layout={margin:{l:62,r:24,t:72,b:58},paper_bgcolor:'#fff',plot_bgcolor:'#fff',xaxis:{title:'類似度',range:[-0.03,1.03],gridcolor:'#eee',zeroline:false},yaxis:{title:'人気度',range:[-0.03,1.03],gridcolor:'#eee',zeroline:false},legend:{orientation:'h',x:0,y:1.16,xanchor:'left',yanchor:'top'},hovermode:'closest'}; Plotly.react('plot',traces,layout,{responsive:true,displaylogo:false}).then(()=>{const plot=document.getElementById('plot'); plot.on('plotly_click',ev=>{const id=ev.points?.[0]?.customdata; updateDetail(currentFiltered.find(x=>x['商品ID']===id));});}); updateDetail(currentFiltered.find(d=>d['商品ID']===selectedId)||currentFiltered[0]); }
function exportCsv(){const period=document.getElementById('periodFilter').value; const cols=['シーズン','カテゴリ','ブランド','商品ID','商品名','類似度','ランキング期間','人気度','対象PF','商品URL','画像URL']; const rows=currentFiltered.map(d=>{const st=currentStats[d['商品ID']]||{}; return {'シーズン':d['シーズン'],'カテゴリ':d['カテゴリ'],'ブランド':d['ブランド'],'商品ID':d['商品ID'],'商品名':d['商品名'],'類似度':Number(d['類似度']||0).toFixed(6),'ランキング期間':period==='all'?'全期間':`直近${period}日`,'人気度':Number(st.popularity||0).toFixed(6),'対象PF':st.platformsText||'','商品URL':urlText(st),'画像URL':d['画像URL']};}); const csv=[cols.join(','),...rows.map(r=>cols.map(c=>csvEsc(r[c])).join(','))].join('\n'); const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`表示データ_${document.getElementById('seasonFilter').value}_${document.getElementById('categoryFilter').value}_${period}.csv`; a.click(); URL.revokeObjectURL(a.href);}
initFilters(true); document.getElementById('exportCsv').addEventListener('click',exportCsv); ['seasonFilter','categoryFilter','periodFilter'].forEach(id=>document.getElementById(id).addEventListener('change',()=>{selectedId=null; render();})); render();
</script></body></html>
