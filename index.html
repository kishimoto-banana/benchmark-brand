<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>商品マッピング（シーズン切替）</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Yu Gothic", sans-serif;
  background: #fafafa;
  color: #222;
}
.wrap {
  display: grid;
  grid-template-columns: 1.5fr 0.95fr;
  gap: 16px;
  padding: 16px;
  height: 100vh;
  box-sizing: border-box;
}
.card {
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  overflow: hidden;
}
#plot {
  width: 100%;
  height: calc(100vh - 32px);
}
.side {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  height: calc(100vh - 32px);
  box-sizing: border-box;
}
.title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
}
.hint {
  color: #666;
  font-size: 13px;
  line-height: 1.5;
}
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  margin-bottom: 4px;
}
.toolbar label {
  color: #666;
  font-size: 13px;
}
.toolbar select {
  border: 1px solid #ddd;
  background: #fff;
  border-radius: 10px;
  padding: 8px 10px;
  font-size: 14px;
}
.meta {
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: 8px 12px;
  font-size: 14px;
  line-height: 1.5;
}
.label { color: #666; }
.badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 999px;
  background: #f0f0f0;
  font-size: 12px;
}
.image-box {
  flex: 1;
  min-height: 320px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f6f6f6;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #eee;
}
.image-box img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: block;
}
</style>
</head>

<div class="wrap">

    <div class="toolbar">
      <label for="seasonFilter">シーズン</label>
      <select id="seasonFilter"></select>
      <label for="categoryFilter">カテゴリ</label>
      <select id="categoryFilter">

    <div class="meta">

      <div class="label">カテゴリ</div><div id="meta-category">-</div>
      <div class="label">類似度</div><div id="meta-sim">-</div>
    </div>
    <div class="image-box"><img id="preview" alt="商品画像" /></div>
  </div>
</div>

const seasonThresholds = {"25FW": 0.5061728395061729, "25SS": 0.5061728395061729, "26SS": 0.5061728395061729};
const seasons = ["26SS", "25SS", "25FW"];

const seasonFilter = document.getElementById("seasonFilter");
const categoryFilter = document.getElementById("categoryFilter");

for (const s of seasons) {
  const opt = document.createElement("option");
  opt.value = s;
  opt.textContent = s;
  seasonFilter.appendChild(opt);
}

function updateCategoryOptions() {
  const selectedSeason = seasonFilter.value;
  const seasonData = rawData.filter(d => d["シーズン"] === selectedSeason);
  const categories = [...new Set(seasonData.map(d => d["カテゴリ"]).filter(Boolean))].sort();

  categoryFilter.innerHTML = "";
  const allOpt = document.createElement("option");
  allOpt.value = "__ALL__";
  allOpt.textContent = "すべて";
  categoryFilter.appendChild(allOpt);

  for (const cat of categories) {
    const opt = document.createElement("option");
    opt.value = cat;
    opt.textContent = cat;
    categoryFilter.appendChild(opt);
  }
}

function updateSidePanel(d) {
  document.getElementById("meta-season").textContent = d["シーズン"] ?? "-";
  document.getElementById("meta-brand").textContent = d["ブランド"] ?? "-";
  document.getElementById("meta-name").textContent = d["商品名"] ?? "-";
  document.getElementById("meta-id").textContent = d["商品ID"] ?? "-";
  document.getElementById("meta-category").textContent = d["カテゴリ"] ?? "-";
  document.getElementById("meta-sim").innerHTML = `${Number(d["類似度"]).toFixed(3)} <span class="badge">raw: ${Number(d["類似度_raw"]).toFixed(3)}</span>`;
  document.getElementById("preview").src = d["画像URL"] || "";
}

function getFilteredData() {
  const selectedSeason = seasonFilter.value;
  const selectedCategory = categoryFilter.value;
  let data = rawData.filter(d => d["シーズン"] === selectedSeason);
  if (selectedCategory !== "__ALL__") {
    data = data.filter(d => d["カテゴリ"] === selectedCategory);
  }
  return data;
}

function uniqueBrands(data) {
  return [...new Set(data.map(d => d["ブランド"]).filter(b => b && b.trim() !== ""))].sort();
}

function buildBrandLevelMap(data) {
  const brands = uniqueBrands(data);
  const levelMap = {};
  brands.forEach((b, i) => levelMap[b] = brands.length - 1 - i);
  if (brands.length === 0) levelMap["商品"] = 0;
  return levelMap;
}

function buildTraces(data) {
  const brands = uniqueBrands(data);
  const traces = [];
  const levelMap = buildBrandLevelMap(data);

  if (brands.length === 0) {
    return {
      traces: [{
        x: data.map(d => d["類似度"]),
        y: data.map(_ => 0),
        mode: "markers",
        type: "scatter",
        name: "商品",
        text: data.map(d =>
          `シーズン: ${d["シーズン"] || "-"}<br>` +
          `ブランド: ${d["ブランド"] || "-"}<br>` +
          `商品名: ${d["商品名"] || "-"}<br>` +
          `商品ID: ${d["商品ID"]}<br>` +
          `カテゴリ: ${d["カテゴリ"] || "-"}<br>` +
          `類似度: ${Number(d["類似度"]).toFixed(3)}<br>` +
          `類似度 raw: ${Number(d["類似度_raw"]).toFixed(3)}`
        ),
        customdata: data,
        hovertemplate: "%{text}<extra></extra>",
        marker: { size: 12, opacity: 0.9, line: {width: 0.5, color: "#ffffff"} }
      }],
      brands: ["商品"],
      levels: {"商品": 0}
    };
  }

  for (const brand of brands) {
    const sub = data.filter(d => d["ブランド"] === brand);
    traces.push({
      x: sub.map(d => d["類似度"]),
      y: sub.map(_ => levelMap[brand]),
      mode: "markers",
      type: "scatter",
      name: brand,
      text: sub.map(d =>
        `シーズン: ${d["シーズン"] || "-"}<br>` +
        `ブランド: ${d["ブランド"] || "-"}<br>` +
        `商品名: ${d["商品名"] || "-"}<br>` +
        `商品ID: ${d["商品ID"]}<br>` +
        `カテゴリ: ${d["カテゴリ"] || "-"}<br>` +
        `類似度: ${Number(d["類似度"]).toFixed(3)}<br>` +
        `類似度 raw: ${Number(d["類似度_raw"]).toFixed(3)}`
      ),
      customdata: sub,
      hovertemplate: "%{text}<extra></extra>",
      marker: { size: 12, opacity: 0.9, line: {width: 0.5, color: "#ffffff"} }
    });
  }
  return { traces, brands, levels: levelMap };
}

function renderPlot() {
  const filtered = getFilteredData();
  const built = buildTraces(filtered);
  const traces = built.traces;
  const brands = built.brands;
  const levels = built.levels;
  const tickvals = brands.map(b => levels[b]);
  const ticktext = brands;
  const threshold = seasonThresholds[seasonFilter.value] ?? 0.5;

  const layout = {
    margin: {l: 110, r: 20, t: 30, b: 65},
    xaxis: {
      title: {text: "類似度", font: {size: 18}},
      range: [0, 1],
      tickfont: {size: 13}
    },
    yaxis: {
      title: {text: "ブランド", font: {size: 16}},
      tickmode: "array",
      tickvals: tickvals,
      ticktext: ticktext,
      tickfont: {size: 12},
      zeroline: false
    },
    legend: {
      title: {text: "ブランド"},
      orientation: "h",
      yanchor: "bottom",
      y: 1.02,
      xanchor: "left",
      x: 0,
      font: {size: 12}
    },
    shapes: [{
      type: "line",
      x0: threshold, x1: threshold,
      y0: -1, y1: Math.max(...tickvals, 0) + 1,
      line: {dash: "dash", width: 1}
    }],
    annotations: [
      {
        x: 0.98, y: 0.95, xref: "paper", yref: "paper",
        text: "<b>高類似</b>", showarrow: false,
        xanchor: "right", yanchor: "top",
        font: {size: 20}
      },
      {
        x: 0.02, y: 0.95, xref: "paper", yref: "paper",
        text: "<b>低類似</b>", showarrow: false,
        xanchor: "left", yanchor: "top",
        font: {size: 20}
      }
    ]
  };

  Plotly.newPlot("plot", traces, layout, {responsive: true, displaylogo: false});
  const plot = document.getElementById("plot");
  plot.on("plotly_hover", (ev) => updateSidePanel(ev.points[0].customdata));
  plot.on("plotly_click", (ev) => updateSidePanel(ev.points[0].customdata));
  if (filtered.length > 0) updateSidePanel(filtered[0]);
}

seasonFilter.addEventListener("change", () => {
  updateCategoryOptions();
  renderPlot();
});

categoryFilter.addEventListener("change", renderPlot);

if (seasons.length > 0) seasonFilter.value = seasons[0];
updateCategoryOptions();
renderPlot();
</script>
</body>
</html>
