<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #fafafa;
      color: #222;
    }
    .wrap {
      display: grid;
      grid-template-columns: 1.5fr 0.95fr;
      gap: 16px;
      padding: 16px;
      height: 100vh;
      box-sizing: border-box;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      overflow: hidden;
    }
    #plot {
      width: 100%;
      height: calc(100vh - 32px);
    }
    .side {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: calc(100vh - 32px);
      box-sizing: border-box;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .hint {
      color: #666;
      font-size: 13px;
      line-height: 1.5;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 4px;
    }
    .toolbar select {
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 14px;
    }
    .meta {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 8px 12px;
      font-size: 14px;
      line-height: 1.5;
    }
    .label {
      color: #666;
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #f0f0f0;
      font-size: 12px;
    }
    .image-box {
      flex: 1;
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f6f6f6;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #eee;
    }
    .image-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div id="plot"></div>
    </div>
    <div class="card side">
      <div>
        <div class="title">商品マッピング</div>

      </div>

      <div class="toolbar">

        <select id="categoryFilter">
          <option value="__ALL__">すべて</option>
        </select>
      </div>

        <div class="label">適合度</div><div id="meta-fit">-</div>
        <div class="label">象限</div><div id="meta-quadrant">-</div>
      </div>

      <div class="image-box">
        <img id="preview" alt="商品画像" />

const similarityThreshold = 0.51785714;
const fitThreshold = 0.81228248;

const categoryFilter = document.getElementById("categoryFilter");
const categories = [...new Set(rawData.map(d => d["カテゴリ"]).filter(Boolean))].sort();
for (const cat of categories) {
  const opt = document.createElement("option");
  opt.value = cat;
  opt.textContent = cat;
  categoryFilter.appendChild(opt);
}

function updateSidePanel(d) {
  document.getElementById("meta-brand").textContent = d["ブランド"] ?? "-";
  document.getElementById("meta-name").textContent = d["商品名"] ?? "-";
  document.getElementById("meta-id").textContent = d["商品ID"] ?? "-";
  document.getElementById("meta-category").textContent = d["カテゴリ"] ?? "-";
  document.getElementById("meta-sim").textContent = Number(d["類似度"]).toFixed(3);
  document.getElementById("meta-fit").textContent = Number(d["適合度"]).toFixed(3);
  document.getElementById("meta-quadrant").innerHTML = `<span class="badge">${d["象限"] || "-"}</span>`;
  document.getElementById("preview").src = d["画像URL"] || "";
}

function getFilteredData() {
  const selected = categoryFilter.value;
  if (selected === "__ALL__") return rawData;
  return rawData.filter(d => d["カテゴリ"] === selected);
}

function uniqueBrands(data) {
  return [...new Set(data.map(d => d["ブランド"]).filter(b => b && b.trim() !== ""))].sort();
}

function buildTraces(data) {
  const brands = uniqueBrands(data);
  const traces = [];

  if (brands.length === 0) {
    traces.push({
      x: data.map(d => d["類似度"]),
      y: data.map(d => d["適合度"]),
      mode: "markers",
      type: "scatter",
      name: "商品",
      text: data.map(d =>
        `ブランド: ${d["ブランド"] || "-"}<br>` +
        `商品名: ${d["商品名"] || "-"}<br>` +
        `商品ID: ${d["商品ID"]}<br>` +
        `カテゴリ: ${d["カテゴリ"] || "-"}<br>` +
        `類似度: ${Number(d["類似度"]).toFixed(3)}<br>` +
        `適合度: ${Number(d["適合度"]).toFixed(3)}<br>` +
        `象限: ${d["象限"] || "-"}`
      ),
      customdata: data,
      hovertemplate: "%{text}<extra></extra>",
      marker: { size: 12, opacity: 0.88, line: {width: 0.5, color: "#ffffff"} }
    });
    return traces;
  }

  for (const brand of brands) {
    const sub = data.filter(d => d["ブランド"] === brand);
    traces.push({
      x: sub.map(d => d["類似度"]),
      y: sub.map(d => d["適合度"]),
      mode: "markers",
      type: "scatter",
      name: brand,
      text: sub.map(d =>
        `ブランド: ${d["ブランド"] || "-"}<br>` +
        `商品名: ${d["商品名"] || "-"}<br>` +
        `商品ID: ${d["商品ID"]}<br>` +
        `カテゴリ: ${d["カテゴリ"] || "-"}<br>` +
        `類似度: ${Number(d["類似度"]).toFixed(3)}<br>` +
        `適合度: ${Number(d["適合度"]).toFixed(3)}<br>` +
        `象限: ${d["象限"] || "-"}`
      ),
      customdata: sub,
      hovertemplate: "%{text}<extra></extra>",
      marker: { size: 12, opacity: 0.88, line: {width: 0.5, color: "#ffffff"} }
    });
  }

  return traces;
}

    },

      },
      {

        line: {dash: "dash", width: 1}
      }
    ],
    annotations: [
      {
        x: 0.98, y: 0.98, xref: "paper", yref: "paper",
        text: "<b>高類似 × 高適合</b>", showarrow: false,
        xanchor: "right", yanchor: "top",
        font: {size: 20}
      },
      {
        x: 0.02, y: 0.98, xref: "paper", yref: "paper",
        text: "<b>低類似 × 高適合</b>", showarrow: false,
        xanchor: "left", yanchor: "top",
        font: {size: 20}
      },
      {
        x: 0.98, y: 0.02, xref: "paper", yref: "paper",
        text: "<b>高類似 × 低適合</b>", showarrow: false,
        xanchor: "right", yanchor: "bottom",
        font: {size: 20}
      },
      {
        x: 0.02, y: 0.02, xref: "paper", yref: "paper",
        text: "<b>低類似 × 低適合</b>", showarrow: false,
        xanchor: "left", yanchor: "bottom",
        font: {size: 20}
      }
    ]
  };

  Plotly.newPlot("plot", traces, layout, {responsive: true, displaylogo: false});

  const plot = document.getElementById("plot");
  plot.on("plotly_hover", (ev) => updateSidePanel(ev.points[0].customdata));
  plot.on("plotly_click", (ev) => updateSidePanel(ev.points[0].customdata));

  if (filtered.length > 0) {
    updateSidePanel(filtered[0]);
  }
}

categoryFilter.addEventListener("change", renderPlot);
renderPlot();
</script>
